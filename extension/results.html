<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="results_title">Results - Summarize and Translate with Gemini</title>
  <link rel="stylesheet" href="css/new.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .results-drop-zone {
      border: 2px dashed transparent;
      border-radius: .75rem;
      transition: border-color .2s ease, background-color .2s ease;
    }

    .results-drop-zone.dragover {
      background-color: var(--nc-bg-2);
      border-color: var(--nc-lk-1);
    }

    #attached-image-preview {
      display: none;
      width: 100%;
      max-width: 320px;
      margin: 0 0 .75rem 0;
    }

    #attached-image-preview.has-image {
      display: block;
    }

    .results-image-preview {
      position: relative;
      box-sizing: border-box;
      border-radius: .75rem;
      background-color: var(--nc-bg-2);
      padding: .5rem;
    }

    .results-image-preview img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 180px;
      margin: 0;
      border-radius: .5rem;
      object-fit: contain;
    }

    .results-image-preview button {
      position: absolute;
      top: .25rem;
      right: .25rem;
      width: 2rem;
      height: 2rem;
      margin: 0;
      padding: 0;
      border-radius: 999px;
      line-height: 1;
    }

    .conversation-image-preview {
      display: inline-block;
      max-width: 320px;
    }

    @media (max-width: 639px) {

      body select,
      body #clear,
      body #copy,
      body #attach-image-button,
      body #send {
        display: block;
      }
    }
  </style>
</head>

<body>
  <header style="padding-top: 1rem; padding-bottom: 0rem;">
    <h1 id="header" style="display: flex; align-items: center;">
      <img src="img/icon-128.png" alt="" width="48" height="48" style="margin-right: .5rem;">
      <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" data-i18n="results_title">
        Results - Summarize and Translate with Gemini
      </span>
    </h1>
  </header>

  <p id="page-source" dir="auto" style="display: none; color: var(--nc-tx-2); opacity: 0.85; margin: 0 0 1rem 0;">
    <span id="page-source-title"></span>
  </p>

  <p id="content" dir="auto"></p>
  <div id="conversation"></div>

  <div>
    <button id="clear" data-i18n="results_button_clear">Clear conversation</button>
    <button id="copy" data-i18n="results_button_copy">Copy</button>
    <button id="save" data-i18n="results_button_save">Save</button>
    <span id="operation-status" style="color: gray;"></span>
  </div>

  <div>
    <div id="follow-up-text-wrapper" class="results-drop-zone">
      <textarea id="text" rows="4" placeholder="Ask a follow-up question (Press Ctrl/Cmd+Enter to send)"
        style="width: 100%; margin-bottom: 0;"></textarea>
    </div>
    <div id="attach-image-ui">
      <button id="attach-image-button" type="button" data-i18n="results_button_attach_image">Attach image</button>
      <input id="attach-image-input" type="file" accept="image/*" hidden>
      <div id="attached-image-preview"></div>
    </div>
    <span id="languageModelContainer"></span>
    <button id="send" type="button" data-i18n="results_button_send">Send</button>
    <span id="send-status" style="color: gray;"></span>
  </div>

  <script src="lib/marked.umd.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <script type="module" src="results.js"></script>
</body>

</html>
